<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Login</title>

<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #f0f2f5;
}

.card {
	border-radius: 20px;
}

.title {
	font-weight: bold;
	color: #0d6efd;
}
</style>

</head>

<body>

	<!-- NAVBAR -->

	<nav class="navbar navbar-dark bg-primary px-3">

		<a class="navbar-brand"> Hospital Management System </a> <a
			href="dashboard.html" class="btn btn-light btn-sm"> Home </a>

	</nav>

	<!-- LOGIN SECTION -->

	<div class="container mt-5">

		<div class="row justify-content-center">

			<div class="col-md-5">

				<div class="card shadow p-4">

					<!-- HEADING -->

					<h2 class="text-center title mb-4">Hospital Login</h2>

					<!-- LOGIN FORM -->

					<form action="login" method="post">

						<!-- SELECT ROLE -->

						<div class="mb-3">

							<label class="form-label"> Login As </label> <select
								class="form-select" name="role" required>

								<option value="">Select User</option>

								<option value="patient">Patient</option>

								<option value="doctor">Doctor</option>

							</select>

						</div>

						<!-- EMAIL -->

						<div class="mb-3">

							<label class="form-label"> Email </label> <input type="email"
								class="form-control" name="email" placeholder="Enter email"
								required>

						</div>

						<!-- PASSWORD -->

						<div class="mb-3">

							<label class="form-label"> Password </label> <input
								type="password" class="form-control" name="password"
								placeholder="Enter password" required>

						</div>

						<!-- LOGIN BUTTON -->

						<button type="submit" class="btn btn-primary w-100">

							Login</button>

					</form>

					<!-- REGISTER LINKS -->

					<div class="text-center mt-4">

						<p class="mb-2">Don't have an account?</p>

						<a href="patientRegister.html"
							class="btn btn-outline-success me-2"> Patient Register </a> <a
							href="doctorRegister.html" class="btn btn-outline-primary">

							Doctor Register </a>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
