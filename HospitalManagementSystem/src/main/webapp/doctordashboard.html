<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f7fa;
}

.navbar{
background:#0d6efd;
}

.navbar-brand{
color:white !important;
font-weight:bold;
}

.card{
border:none;
border-radius:15px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.dashboard-title{
font-weight:bold;
color:#0d6efd;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">
<a class="navbar-brand" href="#">Hospital Management System</a>

<div class="ms-auto">
<a href="logout" class="btn btn-light">Logout</a>
</div>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center dashboard-title mb-4">
Doctor Dashboard
</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>View Appointments</h4>
<p>Check patient appointments</p>
<a href="viewPatients" class="btn btn-success">
Open
</a>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>Patient Details</h4>
<p>View patient information</p>
<a href="#" class="btn btn-success">Open</a>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 text-center">
<h4>Doctor Profile</h4>
<p>Manage doctor profile</p>
<a href="#" class="btn btn-warning">Open</a>
</div>
</div>

</div>

</div>

</body>
</html>
