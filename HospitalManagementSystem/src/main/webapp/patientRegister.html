<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Registration</title>

<!-- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background-color:#f0f2f5;
}

.card{
    border-radius:20px;
}

.title{
    color:#198754;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center title mb-4">
                    Patient Registration
                </h2>

                <form action="patient" method="POST">

                   
                    <div class="mb-3">

                        <label class="form-label">
                            Patient Name
                        </label>

                        <input
                        type="text"
                        class="form-control"
                        name="name"
                        placeholder="Enter patient name"
                        required>

                    </div>

                    <!-- Age -->
                    <div class="mb-3">

                        <label class="form-label">
                            Age
                        </label>

                        <input
                        type="number"
                        class="form-control"
                        name="age"
                        placeholder="Enter age"
                        required>

                    </div>

                    <!-- Gender -->
                    <div class="mb-3">

                        <label class="form-label">
                            Gender
                        </label>

                        <select
                        class="form-select"
                        name="gender"
                        required>

                            <option value="">
                                Select Gender
                            </option>

                            <option value="Male">
                                Male
                            </option>

                            <option value="Female">
                                Female
                            </option>

                            <option value="Other">
                                Other
                            </option>

                        </select>

                    </div>

                    <!-- Mobile -->
                    <div class="mb-3">

                        <label class="form-label">
                            Mobile Number
                        </label>

                        <input
                        type="text"
                        class="form-control"
                        name="mobile"
                        placeholder="Enter mobile number"
                        required>

                    </div>

                    <!-- Email -->
                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                        type="email"
                        class="form-control"
                        name="email"
                        placeholder="Enter email address"
                        required>

                    </div>

                    <!-- Disease -->
                    <div class="mb-3">

                        <label class="form-label">
                            Disease
                        </label>

                        <select
                        class="form-select"
                        name="disease"
                        required>

                            <option value="">
                                -- Select Disease --
                            </option>

                            <option value="Fever">
                                Fever
                            </option>

                            <option value="Cold & Cough">
                                Cold & Cough
                            </option>

                            <option value="Diabetes">
                                Diabetes
                            </option>

                            <option value="Blood Pressure">
                                Blood Pressure
                            </option>

                            <option value="Asthma">
                                Asthma
                            </option>

                            <option value="Heart Disease">
                                Heart Disease
                            </option>

                            <option value="Skin Allergy">
                                Skin Allergy
                            </option>

                            <option value="Stomach Pain">
                                Stomach Pain
                            </option>

                            <option value="Injury">
                                Injury
                            </option>

                            <option value="Other">
                                Other
                            </option>

                        </select>

                    </div>

                    <!-- Password -->
                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Enter password"
                        required>

                    </div>

                    <!-- Register Button -->
                    <button
                    type="submit"
                    class="btn btn-success w-100">

                        Register Patient

                    </button>

                </form>

                <!-- Login -->
                <div class="text-center mt-3">

                    <p>
                        Already have an account?
                    </p>

                    <a
                    href="login.html"
                    class="btn btn-outline-success">

                        Go To Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
