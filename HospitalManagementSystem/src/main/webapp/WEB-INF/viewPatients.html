<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Patient Details</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f5f7fa;
}

.card{
border:none;
border-radius:15px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center text-primary mb-4">
Patient Details
</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Mobile</th>
<th>Disease</th>

</tr>

</thead>

<tbody id="patientData">

</tbody>

</table>

<a href="doctorDashboard.html"
class="btn btn-primary">

Back

</a>

</div>

</div>

<script>

fetch("viewPatients")

.then(response => response.json())

.then(data => {

	let table = "";

	data.forEach(patient => {

		table += `
		
		<tr>
		
		<td>${patient.id}</td>
		<td>${patient.name}</td>
		<td>${patient.age}</td>
		<td>${patient.gender}</td>
		<td>${patient.mobile}</td>
		<td>${patient.disease}</td>
		
		</tr>
		
		`;

	});

	document.getElementById("patientData").innerHTML = table;

});

</script>

</body>
</html>
