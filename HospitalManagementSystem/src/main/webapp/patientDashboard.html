<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Dashboard</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f0f2f5;
	font-family: 'Segoe UI', sans-serif;
}

.navbar {
	background: #198754;
}

.navbar-brand {
	font-weight: bold;
	color: white !important;
}

.card {
	border: none;
	border-radius: 15px;
	transition: 0.3s;
	box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
}

.card:hover {
	transform: scale(1.03);
}

.title {
	font-weight: bold;
	color: #198754;
}
</style>

</head>

<body>

	<nav class="navbar navbar-dark px-3">

		<a class="navbar-brand"> Patient Dashboard </a>

		<div>

			<a href="dashboard.html " class="btn btn-light btn-sm me-2"> Home </a> <a
				href="index.html" class="btn btn-light btn-sm"> Logout </a>

		</div>
	</nav>

	<div class="container mt-5">

		<h2 class="text-center title mb-5">Patient Dashboard</h2>

		<div class="row">

			<div class="col-md-4 mb-4">

				<div class="card p-4 text-center">

					<h4 class="text-success">View Doctors</h4>

					<p>See all available doctors</p>

					<a href="viewDoctors" class="btn btn-success"> Open </a>

				</div>

			</div>

			<div class="col-md-4 mb-4">

				<div class="card p-4 text-center">

					<h4 class="text-primary">My Appointments</h4>

					<p>View booked appointments</p>

					<a href="viewAppointments" class="btn btn-primary"> Open </a>

				</div>

			</div>

			<div class="col-md-4 mb-4">

				<div class="card p-4 text-center">

					<h4 class="text-warning">Patient Profile</h4>

					<p>Manage patient profile</p>

					<a href="#" class="btn btn-warning"> Open </a>

				</div>

			</div>

		</div>

	</div>

</body>

</html>
